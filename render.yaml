services:
  # --- Backend Service ---
  - type: web
    name: voice-agent-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set this in the Render Dashboard
      - key: FRONTEND_URL
        fromService:
          type: web
          name: voice-agent-frontend
          property: host

  # --- Frontend Service ---
  - type: web
    name: voice-agent-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: voice-agent-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
